<!DOCTYPE html>
<html>
<head>
    <title>Student Resource Hub</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
        }

        .card a {
            display: block;
            margin: 10px;
            padding: 10px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        .card a:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <h1>📚 Student Resource Hub</h1>

    <div class="container">

        <div class="card">
            <h2>📘 DevOps Notes</h2>
            <a href="#">Download PDF</a>
        </div>

        <div class="card">

            <a href="#">C Programming</a>
            <a href="#">Python</a>
        </div>

        <div class="card">
            <h2>📂 Previous Papers</h2>
            <a href="#">Semester 5</a>

        </div>

        <div class="card">
            <h2>🎥 Tutorials</h2>
            <a href="#">Watch Videos</a>
        </div>

    </div>

</body>
</html>
